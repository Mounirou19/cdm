services:
  mysql:
    image: mysql:8.0
    container_name: cdm_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: cdm_2026
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:5
    container_name: cdm_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "8080:80"
    depends_on:
      - mysql

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: cdm_backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: mysql://root:password@mysql:3306/cdm_2026
      PORT: "4000"
      CORS_ORIGIN: http://localhost:3000
      NODE_ENV: production
    depends_on:
      - mysql

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: cdm_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - backend

volumes:
  mysql_data:
